name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: fueleu_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          echo "PORT=3001" > .env
          echo "DATABASE_URL=postgresql://postgres:admin123@localhost:5432/fueleu_db" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=admin123" >> .env
          echo "DB_NAME=fueleu_db" >> .env

      - name: Wait for Postgres
        run: sleep 5

      - name: Run migrations
        run: |
          psql postgresql://postgres:admin123@localhost:5432/fueleu_db -f src/infrastructure/db/migrations/001_create_routes.sql
          psql postgresql://postgres:admin123@localhost:5432/fueleu_db -f src/infrastructure/db/migrations/002_create_ship_compliance.sql
          psql postgresql://postgres:admin123@localhost:5432/fueleu_db -f src/infrastructure/db/migrations/003_create_bank_entries.sql
          psql postgresql://postgres:admin123@localhost:5432/fueleu_db -f src/infrastructure/db/migrations/004_create_pools.sql

      - name: Seed database
        run: npx ts-node src/infrastructure/db/seeds/seedRoutes.ts

      - name: Run tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present